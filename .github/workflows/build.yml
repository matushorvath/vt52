name: Build

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Install OpenSCAD
        run: sudo apt install openscad

      - name: Install BOSL2
        run: |
          wget --output-document /tmp/bosl2.tar.gz https://github.com/BelfrySCAD/BOSL2/archive/refs/tags/v2.0.731.tar.gz
          mkdir -p $HOME/.local/share/OpenSCAD/libraries/BOSL2
          tar -xzf /tmp/bosl2.tar.gz --directory=$HOME/.local/share/OpenSCAD/libraries/BOSL2 --strip-components=1

      - name: Build the model
        run: |
          make

      # Generating PNG doesn't work without X: https://github.com/openscad/openscad/issues/1798
      - name: Build the renders
        if: github.ref == 'refs/heads/main'
        run: |
          Xvfb :99 &
          export DISPLAY=:99
          make preview

      - name: Commit the renders
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git fetch origin assets
          git checkout assets
          git add .
          git commit -m "Update renders" || true

      - name: Push the assets branch
        if: github.ref == 'refs/heads/main'
        uses: nick-fields/retry@v4
        with:
          max_attempts: 10
          timeout_seconds: 20
          retry_wait_seconds: 3
          command: |
            git fetch origin assets
            git rebase origin/assets
            git push origin assets
